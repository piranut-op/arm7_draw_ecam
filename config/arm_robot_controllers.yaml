controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
      - joint_7

    command_interfaces:
      - velocity

    state_interfaces:
      - position
      - velocity

    allow_partial_joints_goal: false
    open_loop_control: false
    allow_integration_in_goal_trajectories: true

    # In velocity mode, gains.p maps position error -> commanded velocity.
    # ff_velocity_scale=1.0 passes the trajectory's velocity as feedforward.
    gains:
      joint_1: { p: 8.0,  d: 0.1, i: 0.0, ff_velocity_scale: 1.0 }
      joint_2: { p: 8.0,  d: 0.1, i: 0.0, ff_velocity_scale: 1.0 }
      joint_3: { p: 8.0,  d: 0.1, i: 0.0, ff_velocity_scale: 1.0 }
      joint_4: { p: 8.0,  d: 0.1, i: 0.0, ff_velocity_scale: 1.0 }
      joint_5: { p: 8.0,  d: 0.1, i: 0.0, ff_velocity_scale: 1.0 }
      joint_6: { p: 8.0,  d: 0.1, i: 0.0, ff_velocity_scale: 1.0 }
      joint_7: { p: 8.0,  d: 0.1, i: 0.0, ff_velocity_scale: 1.0 }
